openapi: 3.0.3
info:
  title: Repo Guardian API
  version: 0.1.0
  description: Canonical 8A foundation contract for supervised repository analysis, approval-gated execution planning, durable execution history, saved analysis runs, tracked repositories, additive asynchronous analysis jobs, workspace-scoped sessions, and GitHub App installation access. Production routes use GitHub OAuth session context; the legacy Bearer token remains a local-development fallback.
servers:
  - url: /
paths:
  /api/auth/session:
    get:
      operationId: getAuthSession
      summary: Read the authenticated user, active workspace, and workspace memberships
      x-repo-guardian-response-type: AuthSession
      responses:
        "200":
          description: Active auth session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/auth/github/start:
    get:
      operationId: githubOAuthStart
      summary: Start GitHub OAuth sign-in
      x-repo-guardian-client: false
      responses:
        "302":
          description: Redirect to GitHub OAuth authorization.
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/auth/github/callback:
    get:
      operationId: githubOAuthCallback
      summary: Complete GitHub OAuth sign-in and create a session
      x-repo-guardian-client: false
      responses:
        "302":
          description: Session established and redirected to the web app.
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /api/auth/logout:
    post:
      operationId: logoutAuthSession
      summary: Clear the current auth session
      x-repo-guardian-client: false
      responses:
        "204":
          description: Session cleared.
  /api/workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces available to the authenticated actor
      x-repo-guardian-response-type: ListWorkspacesResponse
      responses:
        "200":
          description: Workspace memberships.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspacesResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      operationId: createWorkspace
      summary: Create a workspace owned by the authenticated actor
      x-repo-guardian-request-type: CreateWorkspaceRequest
      x-repo-guardian-response-type: CreateWorkspaceResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/workspaces/{workspaceId}/installations:
    get:
      operationId: listGitHubInstallations
      summary: List GitHub App installations and synced repositories for a workspace
      x-repo-guardian-response-type: ListGitHubInstallationsResponse
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Workspace installations and repositories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGitHubInstallationsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
  /api/workspaces/{workspaceId}/installations/{installationId}/sync:
    post:
      operationId: syncGitHubInstallation
      summary: Refresh repositories visible through a workspace GitHub App installation
      x-repo-guardian-response-type: SyncGitHubInstallationResponse
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: installationId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Synced installation repositories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncGitHubInstallationResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/github/webhooks:
    post:
      operationId: githubWebhook
      summary: Receive GitHub App installation webhooks
      x-repo-guardian-client: false
      responses:
        "202":
          description: Webhook accepted.
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/analyze:
    post:
      operationId: analyzeRepository
      summary: Analyze a public GitHub repository snapshot
      x-repo-guardian-request-type: AnalyzeRepoRequest
      x-repo-guardian-response-type: AnalyzeRepoResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRepoRequest"
      responses:
        "200":
          description: Repository analysis payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeRepoResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
  /api/analyze/jobs:
    get:
      operationId: listAnalysisJobs
      summary: List asynchronous analysis jobs with optional status filtering
      x-repo-guardian-response-type: ListAnalysisJobsResponse
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - completed
              - failed
              - cancelled
      responses:
        "200":
          description: Analysis jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalysisJobsResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
    post:
      operationId: enqueueAnalysisJob
      summary: Enqueue an asynchronous repository analysis job
      x-repo-guardian-request-type: EnqueueAnalysisJobRequest
      x-repo-guardian-response-type: EnqueueAnalysisJobResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueAnalysisJobRequest"
      responses:
        "202":
          description: Analysis job accepted for background processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueAnalysisJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/analyze/jobs/{jobId}:
    get:
      operationId: getAnalysisJob
      summary: Read the current state of an asynchronous analysis job
      x-repo-guardian-response-type: GetAnalysisJobResponse
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Analysis job detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnalysisJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/analyze/jobs/{jobId}/cancel:
    post:
      operationId: cancelAnalysisJob
      summary: Cancel a queued asynchronous analysis job
      x-repo-guardian-response-type: CancelAnalysisJobResponse
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Cancelled analysis job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAnalysisJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/analyze/jobs/{jobId}/retry:
    post:
      operationId: retryAnalysisJob
      summary: Retry a failed or cancelled asynchronous analysis job
      x-repo-guardian-response-type: RetryAnalysisJobResponse
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Requeued analysis job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAnalysisJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/execution/plan:
    post:
      operationId: createExecutionPlan
      summary: Request an approval-gated execution plan with a short-lived token
      x-repo-guardian-request-type: ExecutionPlanRequest
      x-repo-guardian-response-type: ExecutionPlanResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionPlanRequest"
      responses:
        "200":
          description: Planned execution actions with approval token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionPlanResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/execution/plan/jobs:
    post:
      operationId: enqueueExecutionPlanJob
      summary: Enqueue asynchronous execution-plan generation for a saved analysis run
      x-repo-guardian-request-type: EnqueueExecutionPlanJobRequest
      x-repo-guardian-response-type: EnqueueExecutionPlanJobResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueExecutionPlanJobRequest"
      responses:
        "202":
          description: Execution plan job accepted for background processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueExecutionPlanJobResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/execution/execute:
    post:
      operationId: executeExecutionPlan
      summary: Execute a planned set of actions by presenting a valid approval token
      x-repo-guardian-request-type: ExecutionExecuteRequest
      x-repo-guardian-response-type: ExecutionResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionExecuteRequest"
      responses:
        "200":
          description: Structured execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResult"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/execution/plans/{planId}:
    get:
      operationId: getExecutionPlan
      summary: Read the durable execution plan detail and lifecycle state
      x-repo-guardian-response-type: ExecutionPlanDetailResponse
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Durable execution plan detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionPlanDetailResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/execution/plans/{planId}/events:
    get:
      operationId: listExecutionPlanEvents
      summary: Read ordered audit events for a durable execution plan
      x-repo-guardian-response-type: ExecutionPlanEventsResponse
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Durable execution plan audit events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionPlanEventsResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/runs:
    get:
      operationId: listAnalysisRuns
      summary: List durably saved analysis runs
      x-repo-guardian-response-type: ListAnalysisRunsResponse
      responses:
        "200":
          description: Saved analysis run summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalysisRunsResponse"
    post:
      operationId: saveAnalysisRun
      summary: Save the current analysis payload as a durable run
      x-repo-guardian-request-type: SaveAnalysisRunRequest
      x-repo-guardian-response-type: SaveAnalysisRunResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAnalysisRunRequest"
      responses:
        "201":
          description: Saved analysis run and summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveAnalysisRunResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/runs/{runId}:
    get:
      operationId: getAnalysisRun
      summary: Reopen a durably saved analysis run
      x-repo-guardian-response-type: GetAnalysisRunResponse
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Saved analysis run and summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnalysisRunResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/runs/compare:
    post:
      operationId: compareAnalysisRuns
      summary: Compare two durably saved analysis runs
      x-repo-guardian-request-type: CompareAnalysisRunsRequest
      x-repo-guardian-response-type: CompareAnalysisRunsResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareAnalysisRunsRequest"
      responses:
        "200":
          description: Saved analysis run comparison.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareAnalysisRunsResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/tracked-repositories:
    get:
      operationId: listTrackedRepositories
      summary: List tracked repositories enrolled for repeat analysis
      x-repo-guardian-response-type: ListTrackedRepositoriesResponse
      responses:
        "200":
          description: Tracked repositories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrackedRepositoriesResponse"
    post:
      operationId: createTrackedRepository
      summary: Register a tracked repository for repeat analysis
      x-repo-guardian-request-type: CreateTrackedRepositoryRequest
      x-repo-guardian-response-type: CreateTrackedRepositoryResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrackedRepositoryRequest"
      responses:
        "201":
          description: Created tracked repository.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrackedRepositoryResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/tracked-repositories/{trackedRepositoryId}/history:
    get:
      operationId: getTrackedRepositoryHistory
      summary: Read tracked-repository history, normalized activity feed, and linked fleet context
      x-repo-guardian-response-type: TrackedRepositoryHistoryResponse
      parameters:
        - name: trackedRepositoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: activityKinds
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  $ref: "#/components/schemas/RepositoryActivityKind"
        - name: activityPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: activityPageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: activityCursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: activityCursorDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivityCursorDirection"
        - name: activityIncludeDetails
          in: query
          required: false
          schema:
            type: boolean
        - name: activitySortPreset
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivitySortPreset"
        - name: activityStatuses
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: activityOccurredAfter
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: activityOccurredBefore
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Tracked repository history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedRepositoryHistoryResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/tracked-repositories/{trackedRepositoryId}/activity:
    get:
      operationId: getTrackedRepositoryActivity
      summary: Read a paged tracked-repository activity feed without reloading repository summary context
      x-repo-guardian-response-type: RepositoryActivityFeed
      parameters:
        - name: trackedRepositoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: activityKinds
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  $ref: "#/components/schemas/RepositoryActivityKind"
        - name: activityPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: activityPageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: activityCursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: activityCursorDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivityCursorDirection"
        - name: activityIncludeDetails
          in: query
          required: false
          schema:
            type: boolean
        - name: activitySortPreset
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivitySortPreset"
        - name: activityStatuses
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: activityOccurredAfter
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: activityOccurredBefore
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Tracked repository activity feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryActivityFeed"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/tracked-repositories/{trackedRepositoryId}/timeline:
    get:
      operationId: getTrackedRepositoryTimeline
      summary: Read a cursor-native tracked-repository timeline page with optional event-detail expansion
      x-repo-guardian-response-type: RepositoryTimelinePage
      parameters:
        - name: trackedRepositoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: timelineCursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: timelineDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivityCursorDirection"
        - name: timelineExpand
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryTimelineExpansionMode"
        - name: timelineKinds
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  $ref: "#/components/schemas/RepositoryActivityKind"
        - name: timelineLimit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: timelineStatuses
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: timelineOccurredAfter
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timelineOccurredBefore
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: timelineSortPreset
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryActivitySortPreset"
      responses:
        "200":
          description: Cursor-native tracked repository timeline page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryTimelinePage"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/tracked-repositories/{trackedRepositoryId}/timeline/{activityId}:
    get:
      operationId: getTrackedRepositoryTimelineEvent
      summary: Read a single tracked-repository timeline event with on-demand detail expansion
      x-repo-guardian-response-type: RepositoryActivityEvent
      parameters:
        - name: trackedRepositoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: activityId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: expand
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryTimelineExpansionMode"
      responses:
        "200":
          description: Tracked repository timeline event detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryActivityEvent"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/fleet/status:
    get:
      operationId: getFleetStatus
      summary: Read fleet-wide tracked repository, job, plan, and PR lifecycle status
      x-repo-guardian-response-type: FleetStatusResponse
      responses:
        "200":
          description: Fleet status snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetStatusResponse"
  /api/policy-decisions:
    get:
      operationId: listPolicyDecisions
      summary: List policy-decision audit history with server-side pagination and filters
      x-repo-guardian-response-type: ListPolicyDecisionEventsResponse
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: actionType
          in: query
          required: false
          schema:
            type: string
            enum:
              - analyze_repository
              - schedule_sweep
              - generate_pr_candidates
              - execute_write
        - name: decision
          in: query
          required: false
          schema:
            type: string
            enum:
              - allowed
              - denied
              - manual_review
        - name: repositoryFullName
          in: query
          required: false
          schema:
            type: string
            minLength: 3
      responses:
        "200":
          description: Paginated policy-decision audit history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPolicyDecisionEventsResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /api/sweep-schedules:
    get:
      operationId: listSweepSchedules
      summary: List configured tracked-repository sweep schedules
      x-repo-guardian-response-type: ListSweepSchedulesResponse
      responses:
        "200":
          description: Sweep schedules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSweepSchedulesResponse"
    post:
      operationId: createSweepSchedule
      summary: Create a recurring tracked-repository sweep schedule
      x-repo-guardian-request-type: CreateSweepScheduleRequest
      x-repo-guardian-response-type: CreateSweepScheduleResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSweepScheduleRequest"
      responses:
        "201":
          description: Created sweep schedule.
          content:
            application/json:
              schema:
