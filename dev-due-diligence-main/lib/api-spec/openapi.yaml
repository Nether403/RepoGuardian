openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: github
    description: GitHub portfolio assessment
  - name: benchmark
    description: Profile benchmarking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /github/profile/{username}:
    get:
      operationId: getGithubProfile
      tags: [github]
      summary: Get GitHub user profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GitHub profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /github/repos/{username}:
    get:
      operationId: getGithubRepos
      tags: [github]
      summary: Get GitHub user repositories
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GithubRepo"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /github/events/{username}:
    get:
      operationId: getGithubEvents
      tags: [github]
      summary: Get GitHub user public events
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of public events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GithubEvent"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /github/orgs/{username}:
    get:
      operationId: getGithubOrgs
      tags: [github]
      summary: Get GitHub user organization memberships
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GithubOrg"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /benchmark:
    post:
      operationId: submitBenchmark
      tags: [benchmark]
      summary: Store a profile's benchmark metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenchmarkInput"
      responses:
        "200":
          description: Stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /benchmark/{username}:
    get:
      operationId: getBenchmark
      tags: [benchmark]
      summary: Get percentile ranking for a profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Percentile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkPercentile"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GithubProfile:
      type: object
      properties:
        login:
          type: string
        name:
          type: string
          nullable: true
        avatar_url:
          type: string
        bio:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        blog:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        twitter_username:
          type: string
          nullable: true
        public_repos:
          type: integer
        public_gists:
          type: integer
        followers:
          type: integer
        following:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string
        html_url:
          type: string
      required:
        - login
        - avatar_url
        - public_repos
        - public_gists
        - followers
        - following
        - created_at
        - updated_at
        - html_url
    GithubRepo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        full_name:
          type: string
        description:
          type: string
          nullable: true
        html_url:
          type: string
        language:
          type: string
          nullable: true
        stargazers_count:
          type: integer
        forks_count:
          type: integer
        open_issues_count:
          type: integer
        watchers_count:
          type: integer
        size:
          type: integer
        fork:
          type: boolean
        archived:
          type: boolean
        has_readme:
          type: boolean
          nullable: true
        pushed_at:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
        topics:
          type: array
          items:
            type: string
        license:
          type: object
          nullable: true
          properties:
            name:
              type: string
          required:
            - name
      required:
        - id
        - name
        - full_name
        - html_url
        - stargazers_count
        - forks_count
        - open_issues_count
        - watchers_count
        - size
        - fork
        - archived
        - has_readme
        - created_at
        - updated_at
        - topics
    GithubEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
        repo:
          type: object
          nullable: true
          properties:
            name:
              type: string
          required:
            - name
      required:
        - id
    GithubOrg:
      type: object
      properties:
        login:
          type: string
        avatar_url:
          type: string
        description:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
      required:
        - login
        - avatar_url
    BenchmarkInput:
      type: object
      properties:
        username:
          type: string
        stars_total:
          type: integer
        active_days_90:
          type: integer
        longest_streak:
          type: integer
        followers:
          type: integer
        repo_count:
          type: integer
        overall_score:
          type: integer
      required:
        - username
        - stars_total
        - active_days_90
        - longest_streak
        - followers
        - repo_count
        - overall_score
    BenchmarkPercentile:
      type: object
      properties:
        score_pct:
          type: integer
        activity_pct:
          type: integer
        stars_pct:
          type: integer
        total_profiles:
          type: integer
      required:
        - score_pct
        - activity_pct
        - stars_pct
        - total_profiles
