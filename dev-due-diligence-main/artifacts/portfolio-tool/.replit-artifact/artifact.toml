kind = "web"
previewPath = "/"
title = "Portfolio & Due Diligence Tool"
version = "1.0.0"
id = "artifacts/portfolio-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24086

[services.development]
run = "pnpm --filter @workspace/portfolio-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-tool", "run", "build" ]
publicDir = "artifacts/portfolio-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24086"
BASE_PATH = "/"
